name: ventas-ci

on:
  pull_request:
    paths:
      - 'back-Ventas_SpringBoot/Springboot-API-REST/**'
      - '.github/workflows/ventas-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'back-Ventas_SpringBoot/Springboot-API-REST/**'
      - '.github/workflows/ventas-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw clean test -B