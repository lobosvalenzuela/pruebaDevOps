name: CI/CD Proyecto Semestral - Database

on:
  push:
    branches: [ "deploy" ]
  workflow_dispatch:

jobs:
  build-push-deploy-database:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1
      id: login-ecr

    - name: Build imagen de Database y push a ECR
      env:
        ECR_REPO_URL_DB: ${{ secrets.ECR_REPO_URL_DB }}
        IMAGE_TAG: latest
      run: |
        cd db
        docker build -t $ECR_REPO_URL_DB:$IMAGE_TAG .
        docker push $ECR_REPO_URL_DB:$IMAGE_TAG

    - name: Desplegar Database vía SSM
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar db desde ECR" \
          --parameters '{"commands":[
            "set -e",
            "export AWS_REGION=${{ secrets.AWS_REGION }}",
            "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin '"$ECR_REGISTRY"'",
            "docker pull '"$ECR_REPO_URL_DB"':latest",
            "docker stop db || true",
            "docker rm db || true",
            "docker run -d --name db -p 3306:3306 -v mysql_data:/var/lib/mysql -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} -e MYSQL_DATABASE=despacho_db -e MYSQL_USER=${{ secrets.MYSQL_USER }} -e MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }} '"$ECR_REPO_URL_DB"':latest"
          ]}' \
          --output text